<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand"><span class="logo">⏳</span> Git Dashboard</div>
    <div class="root" id="rootPath">…</div>
    <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
    <div class="conn" id="conn" title="Connexion">
      <span class="dot"></span><span class="conn-label">…</span>
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <div class="side-head">Repos <span id="repoCount" class="pill">0</span></div>
      <div id="repoList"></div>
      <div class="legend">
        <div><span class="sw qg"></span> remote / origin (bare)</div>
        <div><span class="sw staged"></span> staged</div>
        <div><span class="sw modified"></span> modified (working dir)</div>
        <div><span class="sw untracked"></span> untracked</div>
        <div><span class="sw conflict"></span> conflict</div>
      </div>
    </aside>

    <section id="detail">
      <div class="empty" id="emptyState">
        <div class="big">⏳</div>
        <p>Sélectionne un repo à gauche pour explorer sa timeline.</p>
      </div>
    </section>
  </main>

  <script src="graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
